<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/cardtrader-monitor/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" />
    <title>CardTrader Monitor</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Single Page Apps for GitHub Pages
      (((l) => {
        if (l.search[1] === '/' ) {
          const decoded = l.search.slice(1).split('&').map((s) => s.replace(/~and~/g, '&')).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location))
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
